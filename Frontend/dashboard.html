<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard | Credible</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont;
}

body {
  height: 100vh;
  background: radial-gradient(ellipse at bottom, #0b3b75 0%, #05070c 60%);
  color: white;
}

/* ===== DASHBOARD LAYOUT ===== */
.dashboard {
  display: flex;
  height: 100vh;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 260px;
  background: rgba(17, 24, 39, 0.85);
  backdrop-filter: blur(14px);
  padding: 20px;
  display: flex;
  flex-direction: column;
}

.sidebar h2 {
  margin-bottom: 20px;
}

.new-chat {
  background: #3b82f6;
  border: none;
  padding: 10px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  margin-bottom: 20px;
}

.history {
  flex: 1;
  overflow-y: auto;
}

.history-title {
  font-size: 13px;
  color: #9ca3af;
  margin-bottom: 10px;
}

.history-item {
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 6px;
  cursor: pointer;
}

.history-item:hover {
  background: rgba(255,255,255,0.08);
}

/* ===== MAIN AREA ===== */
.dashboard-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 40px;
}

.dashboard-main h1 {
  font-size: 36px;
  margin-bottom: 20px;
}

/* ===== CHAT AREA ===== */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding-bottom: 20px;
}

/* ===== RESULT CARD ===== */
.result-card {
  background: rgba(17, 24, 39, 0.7);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 14px;
  border-left: 4px solid #22c55e;
  animation: slideUp 0.4s ease;
}

.result-card.fake {
  border-left: 4px solid #ef4444;
}

.result-card.misleading {
  border-left: 4px solid #facc15;
}

/* ===== PROMPT BOX ===== */
.prompt-box {
  background: rgba(17, 24, 39, 0.6);
  backdrop-filter: blur(14px);
  border-radius: 16px;
  padding: 14px;
  border: 1px solid rgba(255,255,255,0.08);
}

.prompt-box textarea {
  width: 100%;
  height: 80px;
  background: transparent;
  border: none;
  color: white;
  font-size: 16px;
  resize: none;
  outline: none;
  margin-bottom: 10px;
}

.prompt-box button {
  background: #3b82f6;
  border: none;
  padding: 10px 16px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  font-weight: 600;
}

/* ===== ANIMATION ===== */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .dashboard-main { padding: 20px; }
}
</style>
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>📰 Credible</h2>
    <button class="new-chat">New Analysis</button>

    <div class="history">
      <p class="history-title">Your Searches</p>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="dashboard-main">
    <h1>Fake News Detection</h1>

    <div id="chatArea" class="chat-area"></div>

    <div class="prompt-box">
      <textarea id="newsInput"
        placeholder="Paste a news article or claim here..."></textarea>
      <button id="detectBtn">Detect →</button>
    </div>
  </main>

</div>

<script>
const input = document.getElementById("newsInput");
const detectBtn = document.getElementById("detectBtn");
const chatArea = document.getElementById("chatArea");
const newChatBtn = document.querySelector(".new-chat");

detectBtn.addEventListener("click", async () => {
  const text = input.value.trim();
  if (!text) return;

  detectBtn.textContent = "Analyzing...";
  detectBtn.disabled = true;
  input.disabled = true;

  try {
    const res = await fetch("http://127.0.0.1:5000/predict", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ text })
    });

    const data = await res.json();
    showResult(data.verdict, data.confidence, data.explanation);

  } catch (err) {
    showResult("Error", 0, "Unable to connect to server.");
  } finally {
    detectBtn.textContent = "Detect →";
    detectBtn.disabled = false;
    input.disabled = false;
    input.value = "";
  }
});

function showResult(verdict, confidence, explanation) {
  const card = document.createElement("div");

  let className = "";
  if (verdict === "False") className = "fake";
  if (verdict === "Misleading") className = "misleading";

  card.className = `result-card ${className}`;
  card.innerHTML = `
    <strong>${verdict}</strong>
    <p>Confidence: ${confidence}%</p>
    <p>${explanation}</p>
  `;

  chatArea.appendChild(card);
  chatArea.scrollTop = chatArea.scrollHeight;
}

newChatBtn.addEventListener("click", () => {
  chatArea.innerHTML = "";
  input.value = "";
  input.focus();
});
</script>

</body>
</html>
